# Static inventory example — matches the groups emitted by templates/hcloud_inventory.yml.j2
# and the hcloud.yml dynamic inventory plugin (groups: map).
#
# Group names are illustrative — choose whatever your downstream plays consume:
#   server_nodes  → your control-plane play
#   agent_nodes   → your worker play
#   proxy_hosts   → your load-balancer play
#   vault         → your secrets play
#
# Hetzner label values that produce these groups:
#   role=control-plane  → server_nodes
#   role=worker         → agent_nodes
#   role=proxy          → proxy_hosts
#   role=vault          → vault

all:
  children:
    server_nodes:
      hosts:
        cp-01:
          ansible_host: 10.0.1.11
          hcloud_private_ip: 10.0.1.11
        cp-02:
          ansible_host: 10.0.1.12
          hcloud_private_ip: 10.0.1.12
        cp-03:
          ansible_host: 10.0.1.13
          hcloud_private_ip: 10.0.1.13
    agent_nodes:
      hosts:
        wk-01:
          ansible_host: 10.0.1.21
          hcloud_private_ip: 10.0.1.21
        wk-02:
          ansible_host: 10.0.1.22
          hcloud_private_ip: 10.0.1.22
    proxy_hosts:
      hosts:
        px-01:
          ansible_host: 10.0.1.31
          hcloud_private_ip: 10.0.1.31
        px-02:
          ansible_host: 10.0.1.32
          hcloud_private_ip: 10.0.1.32
    vault:
      hosts:
        vault-01:
          ansible_host: 10.0.1.41
          hcloud_private_ip: 10.0.1.41
        vault-02:
          ansible_host: 10.0.1.42
          hcloud_private_ip: 10.0.1.42
        vault-03:
          ansible_host: 10.0.1.43
          hcloud_private_ip: 10.0.1.43
