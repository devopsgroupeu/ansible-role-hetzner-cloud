---
name: Galaxy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # strict SemVer only — no pre-release auto-publish

jobs:
  publish:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish role to Ansible Galaxy
        uses: robertdebock/galaxy-action@7d89099e09f4385ec4b53eb58c0d120f1ad806dd  # v1.2.1
        with:
          galaxy_api_key: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
          git_branch: main
