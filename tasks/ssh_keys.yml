---
# =============================================================================
# ssh_keys.yml — upload SSH public keys to Hetzner Cloud
#
# Module: hetzner.hcloud.ssh_key
# Loop:   hcloud_ssh_keys
# Gate:   called only when hcloud_ssh_keys | length > 0 and hcloud_provision
#         (both enforced in main.yml)
# =============================================================================

- name: Manage SSH keys
  hetzner.hcloud.ssh_key:
    name: "{{ item.name }}"
    public_key: "{{ item.public_key | default(omit) }}"
    labels: "{{ {hcloud_managed_label_key: hcloud_managed_label_value} | combine(item.labels | default({})) }}"
    state: "{{ item.state | default(hcloud_state) }}"
  loop: "{{ hcloud_ssh_keys }}"
  loop_control:
    label: "{{ item.name }} ({{ item.state | default(hcloud_state) }})"
  register: hcloud_ssh_key_results
