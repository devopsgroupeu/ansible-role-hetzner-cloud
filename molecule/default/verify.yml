---
# =============================================================================
# verify.yml — assert offline validation passed and no API was called
#
# Phase 4: verifies that:
#   - hcloud_provisioned_servers fact is defined and is an empty list (offline)
#   - The static inventory file was rendered to /tmp/hcloud_inventory.yml
#   - The inventory file contains expected YAML group keys
# =============================================================================

- name: Verify offline validation
  hosts: all
  gather_facts: true

  vars:
    # Keep the offline gate active in verify too
    hcloud_provision: false
    hcloud_write_inventory: true
    hcloud_inventory_path: /tmp/hcloud_inventory.yml
    hcloud_ssh_keys:
      - name: demo
        public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestKeyForCIValidationOnly test@ci"
    hcloud_networks:
      - name: demo-net
        ip_range: "10.0.0.0/16"
    hcloud_subnetworks:
      - network: demo-net
        type: cloud
        network_zone: eu-central
        ip_range: "10.0.1.0/24"
    hcloud_servers:
      - name: demo-cp-01
        server_type: cx22
        image: debian-12
        location: nbg1
        labels:
          role: control-plane
    hcloud_load_balancers:
      - name: api-lb
        load_balancer_type: lb11
        location: nbg1
        services:
          - protocol: tcp
            listen_port: 6443
            destination_port: 6443
        targets:
          - type: label_selector
            label_selector: "role=control-plane"
            use_private_ip: true

  tasks:
    - name: Re-include role to set facts within verify play scope
      ansible.builtin.include_role:
        name: ansible-role-hetzner-cloud

    - name: Assert hcloud_provisioned_servers fact is defined
      ansible.builtin.assert:
        that:
          - hcloud_provisioned_servers is defined
          - hcloud_provisioned_servers | type_debug == 'list'
        fail_msg: >-
          hcloud_provisioned_servers fact was not set by outputs.yml.
        success_msg: "hcloud_provisioned_servers fact is defined"

    - name: Assert hcloud_provisioned_servers is empty (no real API calls made)
      ansible.builtin.assert:
        that:
          - hcloud_provisioned_servers | length == 0
        fail_msg: >-
          hcloud_provisioned_servers is not empty — API calls may have occurred.
        success_msg: "hcloud_provisioned_servers=[] confirmed — no resources were provisioned"

    - name: Stat the rendered inventory file
      ansible.builtin.stat:
        path: "{{ hcloud_inventory_path }}"
      register: inv_stat

    - name: Assert inventory file exists and is non-empty
      ansible.builtin.assert:
        that:
          - inv_stat.stat.exists
          - inv_stat.stat.size > 0
        fail_msg: >-
          Inventory file {{ hcloud_inventory_path }} does not exist or is empty.
        success_msg: "Inventory file exists and has content (size={{ inv_stat.stat.size }})"

    - name: Read rendered inventory content
      ansible.builtin.slurp:
        src: "{{ hcloud_inventory_path }}"
      register: inv_content

    - name: Assert inventory contains expected YAML group keys
      ansible.builtin.assert:
        that:
          - "'server_nodes:' in inv_content.content | b64decode"
          - "'agent_nodes:' in inv_content.content | b64decode"
          - "'proxy_hosts:' in inv_content.content | b64decode"
          - "'vault:' in inv_content.content | b64decode"
        fail_msg: >-
          Inventory file is missing expected YAML group keys.
          Content: {{ inv_content.content | b64decode }}
        success_msg: "Inventory file contains all expected YAML group keys"

    - name: Confirm offline run completed without any Hetzner API interaction
      ansible.builtin.debug:
        msg: >-
          Verification passed. validate.yml ran, argument_specs validated,
          outputs.yml set hcloud_provisioned_servers=[], and the static YAML
          inventory template rendered to {{ hcloud_inventory_path }} with
          consumer group keys (server_nodes, agent_nodes, proxy_hosts, vault).
          No HCLOUD_TOKEN was required and no Hetzner resources were created.

# =============================================================================
# Second play: exercise the POPULATED branches of hcloud_inventory.yml.j2.
# The offline converge renders empty groups (hcloud_provisioned_servers=[]),
# so the per-host loops are never covered. Here we stub the fact with fake
# servers and render the template directly (still fully offline — no API).
# The first play's include_role set hcloud_provisioned_servers=[] as a host
# fact, so we must override it with set_fact (a later set_fact wins over an
# earlier one; play vars would not — host facts outrank them).
# =============================================================================
- name: Verify populated inventory render (offline, stubbed servers)
  hosts: all
  gather_facts: false

  tasks:
    - name: Stub provisioned servers (overrides the empty fact from the role)
      ansible.builtin.set_fact:
        hcloud_provisioned_servers:
          - name: cp-01
            ipv4_address: "203.0.113.10"
            labels:
              role: control-plane
            private_networks_info:
              - ip: "10.0.1.11"
          - name: worker-01
            ipv4_address: "203.0.113.20"
            labels:
              role: worker
            private_networks_info:
              - ip: "10.0.1.21"

    - name: Render inventory template with stubbed provisioned servers
      ansible.builtin.template:
        src: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') }}/templates/hcloud_inventory.yml.j2"
        dest: /tmp/hcloud_inventory_populated.yml
        mode: "0640"

    - name: Read the populated inventory back as structured YAML
      ansible.builtin.slurp:
        src: /tmp/hcloud_inventory_populated.yml
      register: populated_inv

    - name: Parse rendered inventory
      ansible.builtin.set_fact:
        populated_parsed: "{{ populated_inv.content | b64decode | from_yaml }}"

    - name: Assert populated groups place servers by their role label
      ansible.builtin.assert:
        that:
          - populated_parsed.all.children.server_nodes.hosts['cp-01'].ansible_host == '203.0.113.10'
          - populated_parsed.all.children.server_nodes.hosts['cp-01'].hcloud_private_ip == '10.0.1.11'
          - populated_parsed.all.children.agent_nodes.hosts['worker-01'].ansible_host == '203.0.113.20'
          - populated_parsed.all.children.agent_nodes.hosts['worker-01'].hcloud_private_ip == '10.0.1.21'
          - "'worker-01' not in populated_parsed.all.children.server_nodes.hosts"
          - "'cp-01' not in populated_parsed.all.children.agent_nodes.hosts"
        fail_msg: >-
          Populated inventory render is incorrect. Rendered content:
          {{ populated_inv.content | b64decode }}
        success_msg: >-
          Populated inventory render correct: cp-01 in server_nodes,
          worker-01 in agent_nodes, with public + private IPs.
