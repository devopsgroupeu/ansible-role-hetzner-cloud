---
# =============================================================================
# molecule/default/molecule.yml — offline render/validate scenario
#
# No HCLOUD_TOKEN is required or used. hcloud_provision: false in converge.yml
# stops the role before any hetzner.hcloud.* API call is made.
# check_mode is NOT the offline gate — the provision flag is.
# =============================================================================

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: hcloud-render
    image: "${MOLECULE_IMAGE:-geerlingguy/docker-debian12-ansible:latest}"
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: ""

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
    ANSIBLE_REMOTE_TMP: /tmp
  inventory:
    hosts:
      all:
        vars:
          ansible_user: root

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
