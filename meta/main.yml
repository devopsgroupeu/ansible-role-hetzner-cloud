---
galaxy_info:
  author: DevOpsGroup
  company: DevOpsGroup s.r.o
  description: >
    Provision and bootstrap Hetzner Cloud infrastructure (SSH keys, networks,
    firewalls, placement groups, servers, primary/floating IPs, volumes, load
    balancers) via the hetzner.hcloud collection. Controller-side role run on
    localhost (connection: local).

  license: Apache-2.0
  min_ansible_version: "2.19"

  role_name: hetzner_cloud
  namespace: devopsgroupeu

  galaxy_tags:
    - hetzner
    - hcloud
    - cloud
    - provisioning
    - infrastructure
    - networking
    - kubernetes
    - iac
    - bootstrap

  platforms:
    - name: Ubuntu
      versions:
        - noble
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: EL
      versions:
        - "9"

dependencies: []
